version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: tukituki
    main: ./cmd/tukituki
    binary: tukituki
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: tukituki
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: tukituki
    repository:
      owner: dvaldivia
      name: homebrew-tukituki
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/dvaldivia/tukituki"
    description: "A terminal UI for managing multiple dev processes"
    license: "Apache-2.0"
    install: |
      bin.install "tukituki"
    test: |
      system "#{bin}/tukituki", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
