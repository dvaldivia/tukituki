baseURL = "https://dvaldivia.github.io/tukituki/"
languageCode = "en-us"
title = "tukituki"
enableRobotsTXT = true
publishDir = "../docs"

[module]
[[module.imports]]
  path = "github.com/imfing/hextra"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "A terminal UI for managing multiple dev processes"

  [params.navbar]
    displayTitle = true
    displayLogo = false

  [params.footer]
    displayCopyright = true

  [params.editURL]
    enable = false
