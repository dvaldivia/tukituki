syntax = "proto3";

package tukituki.otel.notify.v1;

option go_package = "github.com/dvaldivia/tukituki/internal/otel/notify;notify";

// Notifier is the push channel from the otel-collector subprocess to any
// attached TUI. The TUI subscribes once and consumes a server-stream of
// ErrorEvent messages — one per error log record that passes the collector's
// severity filter.
service Notifier {
  rpc Subscribe(SubscribeRequest) returns (stream ErrorEvent);
}

message SubscribeRequest {}

// ErrorEvent is a minimal projection of an OTLP log record. Sent for every
// record whose severity meets or exceeds the collector's MinSeverity.
message ErrorEvent {
  // Unix nanoseconds (lr.time_unix_nano, falling back to observed time).
  int64 timestamp_unix_nano = 1;
  // service.name resource attribute, or "unknown".
  string service_name = 2;
  // Human-readable severity label (e.g. "ERROR", "FATAL").
  string severity = 3;
  // Log record body as a string.
  string body = 4;
}
